apiVersion: apps/v1
kind: Deployment
metadata:
  name: mockoon
  namespace: mockoon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mockoon
  template:
    metadata:
      labels:
        app: mockoon
      annotations:
        # Recomputed by scripts/generate-configmap.sh; change triggers rolling restart
        checksum/configmap: "992cc5210e9627900da027f650468d847a26961dcd445192aa46a2e817edea8d"
    spec:
      volumes:
        - name: mocks
          configMap:
            name: mockoon-mocks
      containers:
        - name: mendix-deploy-api
          image: docker.io/mockoon/cli:latest
          args:
            - --data
            - /config/mendix-deploy-api.json
            - --port
            - "3001"
          ports:
            - containerPort: 3001
          volumeMounts:
            - name: mocks
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 10

        - name: mendix-build-api
          image: docker.io/mockoon/cli:latest
          args:
            - --data
            - /config/mendix-build-api.json
            - --port
            - "3002"
          ports:
            - containerPort: 3002
          volumeMounts:
            - name: mocks
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 3
            periodSeconds: 10

        - name: mendix-repository-api
          image: docker.io/mockoon/cli:latest
          args:
            - --data
            - /config/mendix-repository-api.json
            - --port
            - "3003"
          ports:
            - containerPort: 3003
          volumeMounts:
            - name: mocks
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /
              port: 3003
            initialDelaySeconds: 3
            periodSeconds: 10

        - name: mendix-git-api
          image: docker.io/mockoon/cli:latest
          args:
            - --data
            - /config/mendix-git-api.json
            - --port
            - "3004"
          ports:
            - containerPort: 3004
          volumeMounts:
            - name: mocks
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /
              port: 3004
            initialDelaySeconds: 3
            periodSeconds: 10
